version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - ci
      - dependencies
    ignore:
      - dependency-name: "taiki-e/install-action"
    groups:
      ci-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      rust-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: rust-toolchain
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
