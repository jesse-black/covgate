name: reusable-ci

on:
  workflow_call:

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - uses: taiki-e/install-action@4eac87a84609e7a285bcfd82df34e948017a9fcb # main
        with:
          tool: cargo-llvm-cov@0.8.5
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo llvm-cov --json --output-path target/coverage.json
      - name: Coverage Summary
        run: cargo llvm-cov report
      - name: Dogfood covgate
        run: cargo run -- check target/coverage.json --markdown-output "$GITHUB_STEP_SUMMARY"

  dependency-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - uses: taiki-e/install-action@4eac87a84609e7a285bcfd82df34e948017a9fcb # main
        with:
          tool: cargo-machete@0.9.1
      - name: Dependency hygiene
        run: cargo machete

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - uses: taiki-e/install-action@4eac87a84609e7a285bcfd82df34e948017a9fcb # main
        with:
          tool: cargo-deny@0.19.0
      - name: Dependency policy
        run: cargo deny check advisories licenses sources bans
