name: reusable-ci

on:
  workflow_call:

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: taiki-e/install-action@cd3548cd4edc365cc6652d1d62387d6015646e92 # main
        with:
          tool: cargo-llvm-cov
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo llvm-cov --json --output-path target/coverage.json
      - name: Coverage Summary
        run: cargo llvm-cov report
      - name: Dogfood covgate
        run: cargo run -- check target/coverage.json --markdown-output "$GITHUB_STEP_SUMMARY"

  dependency-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@cd3548cd4edc365cc6652d1d62387d6015646e92 # main
        with:
          tool: cargo-machete
      - name: Dependency hygiene
        run: cargo machete

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@cd3548cd4edc365cc6652d1d62387d6015646e92 # main
        with:
          tool: cargo-deny
      - name: Dependency policy
        run: cargo deny check advisories licenses sources bans
