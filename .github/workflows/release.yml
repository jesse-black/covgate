name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version label used for packaging"
        required: true
        type: string
      publish_release:
        description: "Actually publish the GitHub release"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/reusable-ci.yml

  release-context:
    name: resolve release mode
    needs: validate
    runs-on: ubuntu-24.04
    outputs:
      publish_release: ${{ steps.decide.outputs.publish_release }}
      release_mode: ${{ steps.decide.outputs.release_mode }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch main
        if: github.event_name == 'push'
        run: git fetch --no-tags --prune --depth=1 origin +refs/heads/main:refs/remotes/origin/main

      - name: Decide release mode
        id: decide
        shell: bash
        run: |
          publish_release=false
          release_mode=dry-run

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.publish_release }}" == "true" ]]; then
              publish_release=true
              release_mode=publish
            fi
          elif git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            publish_release=true
            release_mode=publish
          fi

          {
            echo "publish_release=${publish_release}"
            echo "release_mode=${release_mode}"
          } >>"$GITHUB_OUTPUT"

      - name: Summarize release mode
        run: |
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release mode: ${{ steps.decide.outputs.release_mode }}"
          if [[ "${{ steps.decide.outputs.release_mode }}" == "dry-run" ]]; then
            echo "Tag is not on main or publish was not requested, so the workflow will build artifacts without creating a GitHub release."
          fi

  build:
    name: build (${{ matrix.target }})
    needs: release-context
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive_format: tar.gz
            binary_path: target/x86_64-unknown-linux-musl/release/covgate
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive_format: tar.gz
            binary_path: target/aarch64-unknown-linux-musl/release/covgate
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            archive_format: zip
            binary_path: target/x86_64-pc-windows-msvc/release/covgate.exe
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_format: tar.gz
            binary_path: target/aarch64-apple-darwin/release/covgate
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: ${{ endsWith(matrix.target, '-unknown-linux-musl') }}
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --locked --release --bin covgate --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          rm -rf dist
          ./scripts/package-release.sh \
            "${{ matrix.binary_path }}" \
            "${RELEASE_TAG}" \
            "${{ matrix.target }}" \
            "${{ matrix.archive_format }}"

      - name: Upload release archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

  publish:
    name: publish release
    needs: [release-context, build]
    if: ${{ needs.release-context.outputs.publish_release == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate release checksums
        shell: bash
        run: |
          cd dist
          sha256sum covgate-* > checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/covgate-*
            dist/checksums.txt
