name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/reusable-ci.yml

  verify-main-tag:
    name: verify tag is on main
    needs: checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch --no-tags --prune --depth=1 origin +refs/heads/main:refs/remotes/origin/main

      - name: Verify tagged commit is reachable from main
        run: |
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build:
    name: build (${{ matrix.target }})
    needs: verify-main-tag
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive_format: tar.gz
            binary_path: target/x86_64-unknown-linux-musl/release/covgate
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive_format: tar.gz
            binary_path: target/aarch64-unknown-linux-musl/release/covgate
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            archive_format: zip
            binary_path: target/x86_64-pc-windows-msvc/release/covgate.exe
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_format: tar.gz
            binary_path: target/aarch64-apple-darwin/release/covgate
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: ${{ endsWith(matrix.target, '-unknown-linux-musl') }}
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --locked --release --bin covgate --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          rm -rf dist
          ./scripts/package-release.sh \
            "${{ matrix.binary_path }}" \
            "${RELEASE_TAG}" \
            "${{ matrix.target }}" \
            "${{ matrix.archive_format }}"

      - name: Upload release archive artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate release checksums
        shell: bash
        run: |
          cd dist
          sha256sum covgate-* > checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@71d29a04ae7c63895f38299d7a5e05d238f7f445 # v2.5.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/covgate-*
            dist/checksums.txt
